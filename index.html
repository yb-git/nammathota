const SBH={"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"};
async function sbGet(k){try{const r=await fetch(SB_URL+"/rest/v1/farm_data?key=eq."+encodeURIComponent(k)+"&select=value",{headers:SBH});const d=await r.json();return Array.isArray(d)&&d[0]?d[0].value:null;}catch{return null;}}
async function sbSet(k,v){try{await fetch(SB_URL+"/rest/v1/farm_data",{method:"POST",headers:SBH,body:JSON.stringify({key:k,value:v,updated_at:new Date().toISOString()})});}catch{}}
function ls_get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function ls_set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function dbSet(k,v){ls_set(k,v);sbSet(k,v);}
async function dbGet(k){const r=await sbGet(k);if(r!==null){ls_set(k,r);return r;}return ls_get(k);}

/* ── Owner PIN Gate ─────────────────────────────── */
const OWNER_PIN="231106";

function PinGate({onVerified,onCancel}){
  const{lang}=useLang();
  const[pin,setPin]=useState("");
  const[err,setErr]=useState(false);
  const[shake,setShake]=useState(false);
  const[attempts,setAttempts]=useState(0);
  const[locked,setLocked]=useState(false);
  const[lockSec,setLockSec]=useState(0);
  const inputRef=useRef();

  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),100);},[]);
  useEffect(()=>{
    if(locked&&lockSec>0){
      const t=setTimeout(()=>setLockSec(s=>s-1),1000);
      return()=>clearTimeout(t);
    }
    if(locked&&lockSec===0)setLocked(false);
  },[locked,lockSec]);

  const check=v=>{
    if(v===OWNER_PIN){onVerified();}
    else{
      const a=attempts+1;setAttempts(a);
      setErr(true);setShake(true);
      setTimeout(()=>{setShake(false);setPin("");setErr(false);if(a>=3){setLocked(true);setLockSec(60);}
      },600);
    }
  };
  const onKey=e=>{
    if(e.key==="Backspace"){setPin(p=>p.slice(0,-1));setErr(false);}
    else if(/^[0-9]$/.test(e.key)&&pin.length<6){
      const np=pin+e.key;setPin(np);
      if(np.length===6)setTimeout(()=>check(np),80);
    }
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",
      display:"flex",alignItems:"center",justifyContent:"center",
      zIndex:1000,padding:24,backdropFilter:"blur(4px)"}}>
      <div style={{background:"#fff",borderRadius:24,padding:"28px 24px",
        width:"100%",maxWidth:340,boxShadow:"0 24px 64px rgba(0,0,0,.4)",
        animation:"fadeIn .2s ease"}}>

        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:44,marginBottom:10}}>🔐</div>
          <div style={{fontSize:18,fontWeight:800,color:"#1B5E20"}}>
            {lang==="kn"?"Owner PIN ದೃಢೀಕರಣ":"Owner PIN Required"}
          </div>
          <div style={{fontSize:18,color:"#888",marginTop:6,lineHeight:1.5}}>
            {lang==="kn"?"ಈ ವಿಭಾಗವನ್ನು ತೆರೆಯಲು 6-ಅಂಕಿ PIN ನಮೂದಿಸಿ":"Enter your 6-digit PIN to access this section"}
          </div>
        </div>

        {locked?(
          <div style={{textAlign:"center",padding:"16px 0"}}>
            <div style={{fontSize:40,marginBottom:10}}>⏳</div>
            <div style={{fontSize:17,fontWeight:700,color:"#C62828"}}>
              {lang==="kn"?"ತಾತ್ಕಾಲಿಕ ಲಾಕ್":"Temporarily Locked"}
            </div>
            <div style={{fontSize:18,color:"#888",marginTop:6}}>{lockSec}s</div>
          </div>
        ):(
          <>
            {/* PIN dots display */}
            <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:20,
              animation:shake?"shake .4s ease":"none"}}>
              {Array.from({length:6},(_,i)=>(
                <div key={i} style={{width:38,height:46,borderRadius:12,
                  border:`2px solid ${err?"#C62828":i<pin.length?"#1B5E20":"#D0D8D0"}`,
                  background:i<pin.length?(err?"#FFEBEE":"#E8F5E9"):"#F8F8F8",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  transition:"all .15s"}}>
                  {i<pin.length&&<div style={{width:10,height:10,borderRadius:"50%",
                    background:err?"#C62828":"#1B5E20"}}/>}
                </div>
              ))}
            </div>

            {/* Hidden real input for keyboard */}
            <input ref={inputRef} onKeyDown={onKey}
              style={{position:"absolute",opacity:0,width:1,height:1,pointerEvents:"none"}}
              readOnly autoFocus/>

            {/* Number pad */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
              {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>(
                <button key={i} onClick={()=>{
                  if(k==="⌫"){setPin(p=>p.slice(0,-1));setErr(false);}
                  else if(k!==""&&pin.length<6){
                    const np=pin+String(k);setPin(np);
                    if(np.length===6)setTimeout(()=>check(np),80);
                  }
                }} style={{padding:"14px 0",fontSize:k==="⌫"?18:20,fontWeight:k==="⌫"?500:700,
                  background:k===""?"transparent":k==="⌫"?"#F5F5F5":"#F8F8F8",
                  border:`1.5px solid ${k===""?"transparent":"#E8E8E8"}`,
                  borderRadius:14,cursor:k===""?"default":"pointer",
                  color:"#1a1a1a",visibility:k===""?"hidden":"visible"}}>
                  {k}
                </button>
              ))}
            </div>

            {err&&<div style={{textAlign:"center",fontSize:18,color:"#C62828",fontWeight:600,marginBottom:12}}>
              {lang==="kn"?"❌ ತಪ್ಪಾದ PIN":"❌ Incorrect PIN"}{attempts>1?` (${attempts}/3)`:""}
            </div>}

            <button onClick={onCancel}
              style={{width:"100%",background:"none",border:"1.5px solid #ddd",borderRadius:12,
                padding:"11px",fontSize:18,color:"#888",cursor:"pointer",fontWeight:600}}>
              {lang==="kn"?"ರದ್ದು / Cancel":"Cancel"}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

/* ── Farm Creation (7-step wizard) ────────────── */
function FarmCreation({editFarm,onDone,onBack,showToast}){
  const{t}=useLang();
  const[step,setStep]=useState(1);const STEPS=7;
  const[users,setUsers]=useState([]);
  const E_FARM={
    id:editFarm?.id||"f"+uid(),name:"",type:"Areca Nut Farm",icon:"🌾",col:"#1B5E20",desc:"",
    location:{village:"",taluk:"",district:"",state:"Karnataka",mapsLink:""},
    land:{totalAcres:"",purchasedAcres:"",pendingAcres:"",surveyNo:"",landType:"dry"},
    crop:{primary:"Areca Nut — ಅಡಿಕೆ",secondary:"",plantingDate:"",plantsPerAcre:"400"},
    infra:{borewell:false,borewellDepth:"",motorHP:"",electricity:false,meterNo:"",fencing:"none",roadAccess:false},
    budget:{landCost:"",devBudget:"",monthlyBudget:"",taskBudgets:{}},
    supervisorIds:[],createdAt:today(),
  };
  const[f,setF]=useState(editFarm||E_FARM);
  const[saving,setSaving]=useState(false);

  useEffect(()=>{dbGet(gk("users")).then(u=>setUsers((u||[]).filter(x=>x.role==="sup")));});

  const upd=(path,val)=>{
    setF(prev=>{
      const n={...prev};
      const parts=path.split(".");
      if(parts.length===1){n[path]=val;}
      else if(parts.length===2){n[parts[0]]={...n[parts[0]],[parts[1]]:val};}
      else if(parts.length===3){n[parts[0]]={...n[parts[0]],[parts[1]]:{...n[parts[0]][parts[1]],[parts[2]]:val}};}
      return n;
    });
  };

  const save=async()=>{
    if(!f.name.trim()){showToast(t("farmName")+" "+t("required"),"warn");return;}
    setSaving(true);
    const farms=await dbGet(gk("farms"))||[];
    const updated=editFarm?farms.map(x=>x.id===f.id?f:x):[...farms,f];
    await dbSet(gk("farms"),updated);
    setSaving(false);showToast("✅ "+t("saved"));onDone(f);
  };

  const stepTitles=[t("basicInfo"),t("location"),t("landDetails"),t("cropDetails"),t("infrastructure"),t("budgetInfo"),t("assignSupervisors")];
  const inp={width:"100%",padding:"13px 14px",borderRadius:12,border:"1.5px solid #D0D8D0",fontSize:18,boxSizing:"border-box",outline:"none",background:"#fff"};

  const renderStep=()=>{
    switch(step){
      case 1:return(
        <div>
          <Field label={t("farmName")} required mb={14}><input value={f.name} onChange={e=>upd("name",e.target.value)} placeholder="e.g. Mavinakoppa Farm" style={inp}/></Field>
          <Field label={t("farmType")} mb={14}>
            <select value={f.type} onChange={e=>upd("type",e.target.value)} style={inp}>
              {FARM_TYPES.map(ft=><option key={ft}>{ft}</option>)}

          </Field>
          <Field label={t("farmDesc")} mb={14}><input value={f.desc} onChange={e=>upd("desc",e.target.value)} placeholder="ಸಂಕ್ಷಿಪ್ತ ವಿವರ..." style={inp}/></Field>
          <Field label={t("farmIcon")} mb={14}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {FARM_ICONS.map(ic=>(
                <button key={ic} onClick={()=>upd("icon",ic)}
                  style={{fontSize:24,background:f.icon===ic?"#E8F5E9":"transparent",border:f.icon===ic?"2px solid #2E7D32":"2px solid #eee",borderRadius:10,padding:"6px 8px",cursor:"pointer"}}>
                  {ic}
                </button>

            </div>
          </Field>
          <Field label={t("farmColor")} mb={0}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {FARM_COLORS.map(c=>(
                <div key={c} onClick={()=>upd("col",c)}

              ))}
            </div>
          </Field>
          <div style={{background:f.col,borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,marginTop:16}}>
            <span style={{fontSize:32}}>{f.icon}</span>
            <div>
              <div style={{color:"#fff",fontWeight:700,fontSize:17}}>{f.name||"Farm Name"}</div>
              <div style={{color:"rgba(255,255,255,.8)",fontSize:12}}>{f.type}{f.desc?" · "+f.desc:""}</div>
            </div>

                {calcTotalPlants(f.land.purchasedAcres,f.crop.plantsPerAcre).toLocaleString("en-IN")||"—"}
              </div>
            </Field>
          </div>
        </div>
      );
      case 5:return(
        <div>
          <div style={{background:f.infra.borewell?"#E8F5E9":"#F5F5F5",borderRadius:14,padding:14,marginBottom:12,border:`1.5px solid ${f.infra.borewell?"#A5D6A7":"#ddd"}`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:f.infra.borewell?12:0}}>
              <div style={{fontWeight:700,fontSize:14}}>🔩 {t("borewell")}</div>
              <div onClick={()=>upd("infra.borewell",!f.infra.borewell)} style={{width:48,height:26,borderRadius:13,background:f.infra.borewell?"#2E7D32":"#ccc",cursor:"pointer",position:"relative",transition:"background .2s"}}>
                <div style={{position:"absolute",top:3,left:f.infra.borewell?24:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
              </div>
            </div>
            {f.infra.borewell&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Field label={t("borewellDepth")} mb={0}><input type="number" value={f.infra.borewellDepth} onChange={e=>upd("infra.borewellDepth",e.target.value)} placeholder="380" style={inp}/></Field>
                <Field label={t("motorHP")} mb={0}><input type="number" value={f.infra.motorHP} onChange={e=>upd("infra.motorHP",e.target.value)} placeholder="5" style={inp}/></Field>
              </div>
            )}
          </div>
          <div style={{background:f.infra.electricity?"#E3F2FD":"#F5F5F5",borderRadius:14,padding:14,marginBottom:12,border:`1.5px solid ${f.infra.electricity?"#90CAF9":"#ddd"}`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:f.infra.electricity?12:0}}>
              <div style={{fontWeight:700,fontSize:14}}>⚡ {t("electricity")}</div>
              <div onClick={()=>upd("infra.electricity",!f.infra.electricity)} style={{width:48,height:26,borderRadius:13,background:f.infra.electricity?"#0277BD":"#ccc",cursor:"pointer",position:"relative",transition:"background .2s"}}>
                <div style={{position:"absolute",top:3,left:f.infra.electricity?24:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
              </div>
            </div>
            {f.infra.electricity&&<Field label={t("meterNo")} hint={t("optional")} mb={0}><input value={f.infra.meterNo} onChange={e=>upd("infra.meterNo",e.target.value)} placeholder="KEB meter number" style={inp}/></Field>}
          </div>
          <Field label={t("fencing")} mb={12}>
            <div style={{display:"flex",gap:8}}>
              {[["complete",t("complete")],["partial",t("partial")],["none",t("none")]].map(([v,lb])=>(
                <div key={v} onClick={()=>upd("infra.fencing",v)}
                  style={{flex:1,padding:"10px",textAlign:"center",borderRadius:12,cursor:"pointer",
                    border:`1.5px solid ${f.infra.fencing===v?"#2E7D32":"#ddd"}`,
                    background:f.infra.fencing===v?"#E8F5E9":"#fff",
                    fontWeight:f.infra.fencing===v?700:400,fontSize:18,color:f.infra.fencing===v?"#2E7D32":"#555"}}>
                  {lb}
                </div>
              ))}
            </div>
          </Field>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:f.infra.roadAccess?"#E8F5E9":"#F5F5F5",borderRadius:12,border:`1.5px solid ${f.infra.roadAccess?"#A5D6A7":"#ddd"}`}}>
            <div style={{fontWeight:700,fontSize:14}}>🛣️ {t("roadAccess")}</div>
            <div onClick={()=>upd("infra.roadAccess",!f.infra.roadAccess)} style={{width:48,height:26,borderRadius:13,background:f.infra.roadAccess?"#2E7D32":"#ccc",cursor:"pointer",position:"relative",transition:"background .2s"}}>
              <div style={{position:"absolute",top:3,left:f.infra.roadAccess?24:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
            </div>
          </div>
        </div>
      );
      case 6:return(
        <div>
          <div style={{background:"#FFF9C4",borderRadius:12,padding:"10px 14px",marginBottom:14,fontSize:17,color:"#5D4037",lineHeight:1.7}}>
            💡 Set your budget here. The app will track planned vs actual spending automatically.
          </div>
          <Field label={t("landCost")} hint={t("optional")} mb={14}><input type="number" value={f.budget.landCost} onChange={e=>upd("budget.landCost",e.target.value)} placeholder="0" style={inp}/></Field>
          <Field label={t("devBudget")} hint={t("optional")} mb={14}><input type="number" value={f.budget.devBudget} onChange={e=>upd("budget.devBudget",e.target.value)} placeholder="0" style={inp}/></Field>
          <Field label={t("monthlyBudget")} hint={t("optional")} mb={14}><input type="number" value={f.budget.monthlyBudget} onChange={e=>upd("budget.monthlyBudget",e.target.value)} placeholder="0" style={inp}/></Field>
          <div style={{fontSize:18,fontWeight:600,color:"#555",marginBottom:10}}>📋 {t("taskBudget")}</div>
          {DEFAULT_TASK_GROUPS.map(tg=>(
            <div key={tg.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{width:40,height:40,background:tg.col,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#fff",fontWeight:700,flexShrink:0}}>{tg.id}</div>
              <div style={{fontSize:18,flex:1,color:"#333"}}>{tg.kn}</div>
              <input type="number" value={(f.budget.taskBudgets||{})[tg.id]||""}
                onChange={e=>upd("budget.taskBudgets",{...(f.budget.taskBudgets||{}),[tg.id]:e.target.value})}
                placeholder="₹0" style={{...inp,width:100,padding:"8px 10px",fontSize:13}}/>
            </div>
          ))}
        </div>
      );
      case 7:return(
        <div>
          <div style={{background:"#E3F2FD",borderRadius:12,padding:"10px 14px",marginBottom:14,fontSize:17,color:"#1565C0",lineHeight:1.7}}>
            👷 {t("assignSupervisors")} — ಒಬ್ಬ ಮೇಲ್ವಿಚಾರಕ ಒಂದಕ್ಕಿಂತ ಹೆಚ್ಚು Farms ಗೆ ನಿಯೋಜಿಸಬಹುದು.
          </div>
          {users.length===0&&<Empty icon="👷" text="No supervisors created yet" sub="Add supervisors in Manage → Users first"/>}
          {users.map(u=>{
            const assigned=(f.supervisorIds||[]).includes(u.id);
            return(
              <div key={u.id} onClick={()=>{const cur=f.supervisorIds||[];upd("supervisorIds",assigned?cur.filter(x=>x!==u.id):[...cur,u.id]);}}
                style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",background:assigned?"#E8F5E9":"#f9f9f9",borderRadius:14,marginBottom:10,cursor:"pointer",border:`1.5px solid ${assigned?"#A5D6A7":"#eee"}`}}>
                <div style={{width:44,height:44,borderRadius:"50%",background:assigned?"#2E7D32":"#E3F2FD",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{assigned?"✅":"👷"}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:18,color:assigned?"#1B5E20":"#333"}}>{dispName(u)||u.id}</div>
                  <div style={{fontSize:17,color:"#888",marginTop:2}}>ID: {u.id}{u.mobile?" · 📱"+u.mobile:""}</div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }
  };

  return(
    <div style={{minHeight:"100vh",background:"#F0F4F0"}}>
      <div style={{background:f.col||"#1B5E20",padding:"14px 16px",color:"#fff",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",borderRadius:10,padding:"8px 14px",fontSize:18,cursor:"pointer"}}>‹</button>
        <div>
          <div style={{fontSize:18,fontWeight:700}}>{editFarm?t("editFarm"):t("newFarm")}</div>
          <div style={{fontSize:17,opacity:.8}}>{t("step")} {step} {t("of")} {STEPS}: {stepTitles[step-1]}</div>
        </div>
      </div>
      {/* Step indicators */}
      <div style={{display:"flex",gap:4,padding:"12px 16px 0"}}>
        {Array.from({length:STEPS},(_,i)=>(
          <div key={i} style={{flex:1,height:4,borderRadius:4,background:i+1<=step?(f.col||"#1B5E20"):"#ddd",transition:"background .3s"}}/>
        ))}
      </div>
      <div style={{padding:16}}>
        <Card>
          <div style={{fontSize:17,fontWeight:700,color:"#111",marginBottom:16}}>{stepTitles[step-1]}</div>
          {renderStep()}
        </Card>
        <div style={{display:"flex",gap:10,marginTop:4}}>
          {step>1&&<Btn onClick={()=>setStep(s=>s-1)} light col="#555" sm>‹ {t("back")}</Btn>}
          {step<STEPS?<Btn onClick={()=>setStep(s=>s+1)} col={f.col||"#1B5E20"} full>{t("next")}</Btn>
            :<Btn onClick={save} col={f.col||"#1B5E20"} full disabled={saving}>{saving?t("saving"):"✅ "+t("save")}</Btn>}
        </div>
      </div>
    </div>
  );
}

/* ── Dashboard ───────────────────────────────────── */
function Dashboard({farm,tasks,expenses,purchases,payments,labour,trips,income,allTasks,onNav}){
  const{t,lang}=useLang();
  const totalSub=allTasks.reduce((a,tg)=>a+tg.sub.length,0);
  const doneSub=allTasks.reduce((a,tg)=>a+tg.sub.filter((_,i)=>(tasks[tg.id+"-"+i]?.status||"pending")==="taskDone").length,0);
  const pct=totalSub?Math.round(doneSub/totalSub*100):0;
  const mth=new Date().toISOString().slice(0,7);
  const mthExp=expenses.filter(e=>e.date?.startsWith(mth)).reduce((a,e)=>a+(+e.amount||0),0);
  const mthWage=labour.filter(l=>l.date?.startsWith(mth)).reduce((a,l)=>a+(+l.totalWages||0),0);
  const totalSpent=expenses.reduce((a,e)=>a+(+e.amount||0),0)+purchases.reduce((a,p)=>a+(+p.amount||0),0)+labour.reduce((a,l)=>a+(+l.totalWages||0),0);
  const totalIncome=(income||[]).reduce((a,x)=>a+(+x.totalAmt||0),0);
  const profit=totalIncome-totalSpent;
  const devBudget=+(farm.budget?.devBudget||0);
  const budgetPct=devBudget?Math.min(Math.round(totalSpent/devBudget*100),150):0;
  const totalAdv=payments.filter(p=>p.type==="advance").reduce((a,p)=>a+(+p.amount||0),0);
  const totalClaim=payments.filter(p=>p.type==="claim").reduce((a,p)=>a+(+p.amount||0),0);
  const payBalance=totalAdv-totalClaim;

  // Recent activity — last 5 entries across all modules
  const recent=[
    ...expenses.map(e=>({date:e.date,text:e.desc||e.cat,icon:"💸",type:"expense"})),
    ...purchases.map(p=>({date:p.date,text:p.item,icon:"🛒",type:"purchase"})),
    ...trips.map(tr=>({date:tr.date,text:tr.from+"→"+tr.to,icon:"🚗",type:"trip"})),
    ...labour.map(l=>({date:l.date,text:l.workerName,icon:"👷",type:"labour"})),
  ].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,5);

  return(
    <div style={{padding:"14px 14px 20px"}}>
      {/* Farm Banner */}
      <div style={{background:farm.col||"#1B5E20",borderRadius:20,padding:"18px 16px",color:"#fff",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <div style={{fontSize:18,opacity:.8}}>{farm.type}{farm.location?.village?" · "+farm.location.village:""}</div>
            {farm.land?.purchasedAcres&&<div style={{fontSize:17,opacity:.7,marginTop:2}}>✅ {farm.land.purchasedAcres} acres · {farm.land.pendingAcres?" ⏳ "+farm.land.pendingAcres+" pending":""}</div>}
          </div>
          <ProgressRing pct={pct} col="rgba(255,255,255,.9)" size={70}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {[
            {label:t("tasks"),val:`${doneSub}/${totalSub}`,icon:"📋",page:"tasks"},
            {label:t("expenses"),val:fmtCur(mthExp),icon:"💸",page:"finance"},
            {label:t("labour"),val:fmtCur(mthWage),icon:"👷",page:"daily"},
          ].map(s=>(
            <div key={s.label} onClick={()=>onNav(s.page)}
              style={{background:"rgba(255,255,255,.15)",borderRadius:14,padding:"10px 8px",textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:17,opacity:.8,marginBottom:3}}>{s.icon}</div>
              <div style={{fontSize:17,fontWeight:800}}>{s.val}</div>
              <div style={{fontSize:18,opacity:.75,marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Budget Overview */}
      {devBudget>0&&(
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:18,fontWeight:700}}>💰 {t("budget")}</div>
            <div style={{fontSize:17,color:budgetPct>100?"#C62828":"#2E7D32",fontWeight:600}}>{budgetPct>100?t("overBudget"):t("onTrack")}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            {[
              {label:t("totalBudget"),val:fmtCur(devBudget),col:"#555"},
              {label:t("spent"),val:fmtCur(totalSpent),col:"#E65100"},
              {label:t("remaining"),val:fmtCur(Math.max(devBudget-totalSpent,0)),col:"#2E7D32"},
            ].map(s=>(
              <div key={s.label} style={{background:"#f8f8f8",borderRadius:12,padding:"10px 10px",textAlign:"center"}}>
                <div style={{fontSize:17,fontWeight:700,color:s.col}}>{s.val}</div>
                <div style={{fontSize:18,color:"#888",marginTop:3}}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{height:10,background:"#f0f0f0",borderRadius:6}}>
            <div style={{height:10,width:Math.min(budgetPct,100)+"%",background:budgetPct>80?"#E65100":"#2E7D32",borderRadius:6,transition:"width .5s"}}/>
          </div>
          <div style={{fontSize:17,color:"#888",textAlign:"right",marginTop:4}}>{budgetPct}% {t("spent")}</div>
        </Card>
      )}

      {/* Quick stats grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        {[
          {label:t("purchases"),val:purchases.length+" items",icon:"🛒",col:"#6A1B9A",bg:"#F3E5F5",page:"finance"},
          {label:t("payments"),val:(payBalance>=0?"↑ ":"↓ ")+fmtCur(Math.abs(payBalance)),icon:"💳",col:"#0277BD",bg:"#E3F2FD",page:"finance"},
          {label:t("income"),val:fmtCur(totalIncome),icon:"🌾",col:"#2E7D32",bg:"#E8F5E9",page:"finance"},
          {label:t("profit"),val:(profit>=0?"▲ ":"▼ ")+fmtCur(Math.abs(profit)),icon:profit>=0?"📈":"📉",col:profit>=0?"#1B5E20":"#C62828",bg:profit>=0?"#E8F5E9":"#FFEBEE",page:"finance"},
        ].map(s=>(
          <div key={s.label} onClick={()=>onNav(s.page)}
            style={{background:s.bg,borderRadius:16,padding:"13px 14px",cursor:"pointer"}}>
            <div style={{fontSize:22,marginBottom:5}}>{s.icon}</div>
            <div style={{fontSize:18,fontWeight:700,color:s.col}}>{s.val}</div>
            <div style={{fontSize:17,color:s.col,opacity:.8,marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Task progress */}
      <Card>
        <div style={{fontSize:18,fontWeight:700,marginBottom:12}}>📊 {t("progress")}</div>
        {allTasks.map(tg=>{
          const done=tg.sub.filter((_,i)=>(tasks[tg.id+"-"+i]?.status||"pending")==="taskDone").length;
          const p=tg.sub.length?Math.round(done/tg.sub.length*100):0;
          const planned=+(farm.budget?.taskBudgets||{})[tg.id]||0;
          return(
            <div key={tg.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:tg.col}}/>
                  <span style={{fontSize:17,fontWeight:600,color:tg.col}}>{tg.kn}</span>
                  {planned>0&&<span style={{fontSize:18,color:"#aaa"}}>{fmtCur(planned)}</span>}
                </div>
                <span style={{fontSize:17,color:"#888"}}>{done}/{tg.sub.length}</span>
              </div>
              <div style={{height:6,background:"#f0f0f0",borderRadius:6}}>
                <div style={{height:6,width:p+"%",background:tg.col,borderRadius:6,transition:"width .4s"}}/>
              </div>
            </div>
          );
        })}
      </Card>

      {/* Recent Activity */}
      <Card>
        <div style={{fontSize:18,fontWeight:700,marginBottom:12}}>🕒 {t("recentActivity")}</div>
        {recent.length===0?<div style={{fontSize:18,color:"#aaa",textAlign:"center",padding:"10px 0"}}>{t("noActivity")}</div>
          :recent.map((r,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<recent.length-1?"1px solid #f5f5f5":"none"}}>
              <span style={{fontSize:18,width:28,textAlign:"center"}}>{r.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:18,fontWeight:500,color:"#333",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.text}</div>
              </div>
              <div style={{fontSize:17,color:"#aaa",flexShrink:0}}>{fmt(r.date)}</div>
            </div>
          ))}
      </Card>

      <div style={{textAlign:"center",fontSize:18,color:"#ccc",padding:"8px 0"}}>CodeTrail Technologies Private Limited</div>
    </div>
  );
}

/* ── Tasks Page ──────────────────────────────────── */
function TasksPage({farm,tasks,setTasks,customTasks,setCustomTasks,user,showToast}){
  const{t,lang}=useLang();const isOwner=user.role==="owner";
  const[open,setOpen]=useState(null);const[viewImg,setViewImg]=useState(null);
  const[drafts,setDrafts]=useState({});const[savedK,setSavedK]=useState({});
  const[editSub,setEditSub]=useState(null);const[editVal,setEditVal]=useState("");
  const[addFor,setAddFor]=useState(null);const[newSV,setNewSV]=useState("");
  const[showNG,setShowNG]=useState(false);const[newG,setNewG]=useState({kn:"",en:"",palIdx:0});
  const fileRefs=useRef({});
  // All tasks come ONLY from customTasks (defaults seeded on first farm load)
  const allTG=customTasks.filter(g=>!g.id.endsWith("_ov"));

  const isDirty=k=>{const d=drafts[k]||{};const s=tasks[k]||{};return Object.keys(d).some(f=>d[f]!==(s[f]||""));};
  const mD=(k,f,v)=>setDrafts(p=>({...p,[k]:{...p[k],[f]:v}}));
  const saveT=k=>{
    setTasks(p=>({...p,[k]:{...p[k],...drafts[k]}}));
    setDrafts(p=>{const n={...p};delete n[k];return n;});
    setSavedK(p=>({...p,[k]:true}));showToast("✅ "+t("saved"));
    setTimeout(()=>setSavedK(p=>{const n={...p};delete n[k];return n;}),2500);
  };
  const setSt=(k,st)=>{
    setTasks(p=>({...p,[k]:{...p[k],status:st,doneDate:st==="taskDone"?today():(p[k]?.doneDate||null)}}));
    setSavedK(p=>({...p,[k]:true}));showToast("✅ "+t("status")+" "+t("saved"));
    setTimeout(()=>setSavedK(p=>{const n={...p};delete n[k];return n;}),2000);
  };
  const addMedia=(k,file)=>compress(file).then(d=>{
    const m={id:uid(),name:file.name,data:d,date:today()};
    setTasks(p=>({...p,[k]:{...p[k],media:[...(p[k]?.media||[]),m]}}));showToast("📷 "+t("saved"));
  });
  const delMedia=(k,mid)=>setTasks(p=>({...p,[k]:{...p[k],media:(p[k]?.media||[]).filter(m=>m.id!==mid)}}));
  // getOv no longer needed - all tasks editable directly in customTasks
  const getSubs=tg=>tg.sub||[];
  const saveES=tg=>{
    // All tasks now live in customTasks — simple direct update
    setCustomTasks(p=>p.map(g=>g.id===tg.id?{...g,sub:g.sub.map((s,i)=>i===editSub.idx?editVal:s)}:g));
    setEditSub(null);showToast("✅ "+t("saved"));
  };
  const addSub=tid=>{
    if(!newSV.trim())return;
    // All tasks now in customTasks — direct update
    setCustomTasks(p=>p.map(g=>g.id===tid?{...g,sub:[...g.sub,newSV.trim()]}:g));
    setNewSV("");setAddFor(null);showToast("✅ "+t("add"));
  };
  const addGrp=()=>{
    if(!newG.kn.trim())return;const pal=TP[newG.palIdx];
    const cid="C"+(customTasks.filter(g=>g.id.startsWith("C")&&!g.id.includes("_ov")).length+1).toString().padStart(2,"0");
    setCustomTasks(p=>[...p,{id:cid,kn:newG.kn,en:newG.en||newG.kn,...pal,sub:[]}]);
    setNewG({kn:"",en:"",palIdx:0});setShowNG(false);showToast("✅ "+t("add"));
  };
  const anyDirty=Object.keys(drafts).length>0;

  return(
    <div style={{padding:"14px 14px 24px"}}>
      {viewImg&&<div onClick={()=>setViewImg(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.93)",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
        <img src={viewImg.data} alt="" style={{maxWidth:"100%",maxHeight:"70vh",borderRadius:14,objectFit:"contain"}}/>
        <button onClick={()=>setViewImg(null)} style={{marginTop:16,background:"rgba(255,255,255,.2)",border:"none",color:"#fff",borderRadius:20,padding:"10px 28px",fontSize:18,cursor:"pointer"}}>✕ {t("back")}</button>
      </div>}

      <SHdr title={<span>📋 {t("taskList")}{anyDirty&&<Dot/>}</span>}
        action={isOwner&&<div style={{display:"flex",gap:8}}>
          <button onClick={()=>{if(window.confirm(lang==="kn"?"Default tasks ಮರಳಿ ತರುವುದೇ?":"Restore all default task groups?"))setCustomTasks(DEFAULT_TASK_GROUPS.map(tg=>({...tg,sub:[...tg.sub]})));}} style={{background:"#F0F4F0",border:"1.5px solid #ccc",borderRadius:12,padding:"8px 12px",fontSize:17,fontWeight:600,cursor:"pointer",color:"#555"}}>↺ {lang==="kn"?"ಮರಳಿ":"Reset"}</button>
          <Btn onClick={()=>setShowNG(true)} sm col={farm.col}>{t("addGroup")}</Btn>
        </div>}/>

      {anyDirty&&<div style={{background:"#FFF3E0",border:"1.5px solid #FFB74D",borderRadius:14,padding:"11px 14px",marginBottom:14,fontSize:18,color:"#E65100",fontWeight:600}}>⚠️ {t("unsavedWarn")}</div>}

      {isOwner&&showNG&&(
        <Card style={{border:"2px solid #A5D6A7",marginBottom:14}}>
          <Field label="ಹೆಸರು *"><input value={newG.kn} onChange={e=>setNewG({...newG,kn:e.target.value})} placeholder="ಕಾರ್ಯದ ಗ್ರೂಪ್ ಹೆಸರು"/></Field>
          <Field label="English" mb={10}><input value={newG.en} onChange={e=>setNewG({...newG,en:e.target.value})}/></Field>
          <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:12}}>
            {TP.map((p,i)=><div key={i} onClick={()=>setNewG({...newG,palIdx:i})} style={{width:32,height:32,borderRadius:10,background:p.col,cursor:"pointer",border:newG.palIdx===i?"3px solid #000":"2.5px solid transparent"}}/>)}
          </div>
          <div style={{display:"flex",gap:10}}><Btn onClick={addGrp} full>✅ {t("add")}</Btn><Btn onClick={()=>setShowNG(false)} light col="#555" sm>{t("cancel")}</Btn></div>
        </Card>
      )}

      {allTG.map(tg=>{
        const subs=getSubs(tg);const done=subs.filter((_,i)=>(tasks[tg.id+"-"+i]?.status||"pending")==="taskDone").length;
        const isOpen=open===tg.id;const isC=tg.id.startsWith("C");const gDirty=subs.some((_,i)=>isDirty(tg.id+"-"+i));
        const planned=+(farm.budget?.taskBudgets||{})[tg.id]||0;
        return(
          <div key={tg.id} style={{marginBottom:12,borderRadius:18,overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,.08)",border:`1.5px solid ${gDirty?tg.col+"80":"transparent"}`}}>
            <div style={{background:tg.col,padding:"13px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setOpen(isOpen?null:tg.id)}>
              <div style={{flex:1}}>
                <div style={{color:"#fff",fontWeight:800,fontSize:15}}>{tg.id} — {tg.kn}</div>
                <div style={{color:"rgba(255,255,255,.75)",fontSize:17,marginTop:2}}>
                  {tg.en} · {done}/{subs.length} {t("taskDone")}
                  {planned>0&&<span style={{marginLeft:8,opacity:.8}}>· {t("planned")}: {fmtCur(planned)}</span>}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                {gDirty&&<span style={{background:"#E65100",color:"#fff",borderRadius:8,padding:"2px 8px",fontSize:17,fontWeight:700}}>!</span>}
                {/* delete moved to bottom of expanded group */}
                <div style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,.25)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13}}>{isOpen?"▲":"▼"}</div>
              </div>
            </div>
            <div style={{height:5,background:tg.bg}}><div style={{height:5,width:(done/Math.max(subs.length,1)*100)+"%",background:tg.col,transition:"width .4s"}}/></div>
            {isOpen&&(
              <div style={{background:tg.bg}}>
                {subs.map((sub,i)=>{
                  const k=tg.id+"-"+i;const sv=tasks[k]||{};const dr=drafts[k]||{};const dirty=isDirty(k);const jSaved=savedK[k];
                  const cNote=dr.note!==undefined?dr.note:(sv.note||"");const cStart=dr.startDate!==undefined?dr.startDate:(sv.startDate||"");
                  const cSt=sv.status||"pending";const isEd=editSub&&editSub.tId===tg.id&&editSub.idx===i;
                  return(
                    <div key={i} style={{padding:"13px 14px",borderTop:`1px solid ${tg.col}20`,background:dirty?"rgba(230,81,0,0.04)":"transparent"}}>
                      {isEd?(
                        <div style={{display:"flex",gap:8,marginBottom:12}}>
                          <input value={editVal} onChange={e=>setEditVal(e.target.value)} style={{flex:1,borderColor:tg.col,borderRadius:12,padding:"10px 12px",border:`1.5px solid ${tg.col}`}}/>
                          <button onClick={()=>saveES(tg)} style={{background:tg.col,color:"#fff",border:"none",borderRadius:12,padding:"10px 14px",cursor:"pointer"}}>✓</button>
                          <button onClick={()=>setEditSub(null)} style={{background:"#eee",border:"none",borderRadius:12,padding:"10px 14px",cursor:"pointer"}}>✕</button>
                        </div>
                      ):(
                        <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
                          <div onClick={()=>setSt(k,cSt==="taskDone"?"pending":"taskDone")}
                            style={{width:24,height:24,borderRadius:7,background:cSt==="taskDone"?tg.col:"transparent",border:`2px solid ${tg.col}`,flexShrink:0,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                            {cSt==="taskDone"&&<span style={{color:"#fff",fontSize:18,lineHeight:1}}>✓</span>}
                          </div>
                          <span style={{fontSize:18,fontWeight:600,flex:1,lineHeight:1.4,textDecoration:cSt==="taskDone"?"line-through":"none",opacity:cSt==="taskDone"?.5:1}}>{sub}</span>
                          {isOwner&&<div style={{display:"flex",gap:4}}>
                            <button onClick={()=>{setEditSub({tId:tg.id,idx:i});setEditVal(sub);}} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:tg.col}}>✏️</button>
                            {isC&&<button onClick={()=>{if(window.confirm(lang==="kn"?"ಈ sub-task ಅಳಿಸುವುದೇ?":"Delete this sub-task?"))setCustomTasks(p=>p.map(g=>g.id===tg.id?{...g,sub:g.sub.filter((_,j)=>j!==i)}:g));}} style={{background:"#FFEBEE",border:"none",fontSize:18,cursor:"pointer",color:"#C62828",borderRadius:8,padding:"4px 8px",fontWeight:700}}>🗑</button>}
                          </div>}
                        </div>
                      )}
                      <div style={{marginBottom:10}}><StatusPicker value={cSt} onChange={v=>setSt(k,v)} col={tg.col}/>{cSt==="taskDone"&&sv.doneDate&&<span style={{fontSize:17,color:tg.col,fontWeight:600,marginLeft:10}}>✅ {fmt(sv.doneDate)}</span>}</div>
                      <Field label={<span style={{fontSize:17,color:"#666"}}>{t("startDate")}{dr.startDate!==undefined&&dr.startDate!==sv.startDate&&<Dot/>}</span>} mb={10}>
                        <input type="date" value={cStart} onChange={e=>mD(k,"startDate",e.target.value)} style={{fontSize:18,padding:"9px 12px",borderColor:tg.col+"60",borderRadius:12,border:`1.5px solid ${tg.col}60`,width:"100%",background:"#fff"}}/>
                      </Field>
                      <Field label={<span style={{fontSize:17,color:"#666"}}>{t("noteSave")}{dr.note!==undefined&&dr.note!==sv.note&&<Dot/>}</span>} mb={10}>
                        <textarea value={cNote} onChange={e=>mD(k,"note",e.target.value)} rows={2} placeholder="ಇಲ್ಲಿ ಬರೆಯಿರಿ..." style={{borderColor:dirty?tg.col:tg.col+"40",borderRadius:12,border:`1.5px solid ${dirty?tg.col:tg.col+"40"}`,padding:"10px 12px",width:"100%",background:"#fff",resize:"none",outline:"none",fontSize:14}}/>
                      </Field>
                      <div style={{marginBottom:12}}><SaveBar dirty={dirty} saved={jSaved} onSave={()=>saveT(k)}/></div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                        <button onClick={()=>fileRefs.current[k]?.click()} style={{background:tg.col+"20",border:`1.5px solid ${tg.col}50`,color:tg.col,borderRadius:12,padding:"8px 14px",fontSize:18,fontWeight:600,cursor:"pointer"}}>📷 {t("photo")}</button>
                        <input ref={el=>fileRefs.current[k]=el} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)addMedia(k,f);e.target.value="";}}/>
                        {(sv.media||[]).map(m=>(
                          <div key={m.id} style={{position:"relative"}}>
                            <img src={m.data} alt="" onClick={()=>setViewImg(m)} style={{width:52,height:52,objectFit:"cover",borderRadius:10,cursor:"pointer",border:`2px solid ${tg.col}60`}}/>
                            <button onClick={()=>delMedia(k,m.id)} style={{position:"absolute",top:-6,right:-6,background:"#C62828",color:"#fff",border:"none",borderRadius:"50%",width:20,height:20,fontSize:17,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
                {isOwner&&<div style={{padding:"11px 14px",borderTop:`1px dashed ${tg.col}40`}}>
                  {/* DELETE GROUP — bottom of expanded, safe from accidental tap */}
                  <button onClick={()=>{if(window.confirm(lang==="kn"?"ಈ Task Group ಮತ್ತು ಎಲ್ಲಾ sub-tasks ಅಳಿಸುವುದೇ?":"Delete this entire task group and all its sub-tasks?"))setCustomTasks(p=>p.filter(g=>g.id!==tg.id));}}
                    style={{width:"100%",background:"#FFEBEE",border:"1.5px solid #FFCDD2",borderRadius:12,
                      padding:"10px",marginBottom:10,fontSize:18,fontWeight:600,cursor:"pointer",
                      color:"#C62828",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    🗑 {lang==="kn"?"Task Group ಅಳಿಸಿ":"Delete Task Group"}
                  </button>
                  {addFor===tg.id?(
                    <div style={{display:"flex",gap:8}}>
                      <input value={newSV} onChange={e=>setNewSV(e.target.value)} placeholder="ಉಪ ಕೆಲಸ ಹೆಸರು..." style={{flex:1,fontSize:18,padding:"10px 12px",borderColor:tg.col,borderRadius:12,border:`1.5px solid ${tg.col}`,background:"#fff",outline:"none"}} onKeyDown={e=>e.key==="Enter"&&addSub(tg.id)}/>
                      <button onClick={()=>addSub(tg.id)} style={{background:tg.col,color:"#fff",border:"none",borderRadius:12,padding:"10px 16px",fontSize:18,fontWeight:700,cursor:"pointer"}}>{t("add")}</button>
                      <button onClick={()=>setAddFor(null)} style={{background:"#eee",border:"none",borderRadius:12,padding:"10px 12px",fontSize:18,cursor:"pointer"}}>✕</button>
                    </div>
                  ):(
                    <button onClick={()=>{setAddFor(tg.id);setNewSV("");}} style={{background:"none",border:`1.5px dashed ${tg.col}60`,color:tg.col,borderRadius:12,padding:"10px 16px",fontSize:18,fontWeight:600,cursor:"pointer",width:"100%"}}>{t("addSubTask")}</button>
                  )}
                </div>}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}


/* ═══════════════════════════════════════════════

/* ── Daily Log (Trips + Labour) ────────────────── */
function DailyPage({farm,trips,setTrips,labour,setLabour,workers,setWorkers,showToast}){
  const{t}=useLang();
  const[tab,setTab]=useState("trips");
  return(
    <div style={{padding:"14px 14px 24px"}}>
      <div style={{fontSize:17,fontWeight:700,marginBottom:14}}>📅 {t("dailyLog")}</div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["trips","🚗 "+t("trips")],["labour","👷 "+t("labour")]].map(([id,lb])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{flex:1,padding:"11px",borderRadius:14,border:`1.5px solid ${tab===id?farm.col:"#ddd"}`,
              background:tab===id?farm.col:"#fff",color:tab===id?"#fff":"#555",
              fontSize:18,fontWeight:700,cursor:"pointer"}}>
            {lb}
          </button>
        ))}
      </div>
      {tab==="trips"&&<TripsTab farm={farm} trips={trips} setTrips={setTrips} showToast={showToast}/>}
      {tab==="labour"&&<LabourTab farm={farm} labour={labour} setLabour={setLabour} workers={workers} setWorkers={setWorkers} showToast={showToast}/>}
    </div>
  );
}

function TripsTab({farm,trips,setTrips,showToast}){
  const{t}=useLang();
  const E={date:today(),from:"",to:"",km:"",vehicle:VEHICLES[0],fuelAmt:"",purpose:"",outcome:""};
  const[form,setForm]=useState(E);const[show,setShow]=useState(false);const[editId,setEditId]=useState(null);const[savedId,setSavedId]=useState(null);
  const save=()=>{
    if(!form.from||!form.to){showToast(t("from")+" & "+t("to")+" "+t("required"),"warn");return;}
    const nid=editId||uid();
    if(editId)setTrips(p=>p.map(x=>x.id===editId?{...x,...form}:x));else setTrips(p=>[{id:nid,...form},...p]);
    setSavedId(nid);showToast("✅ "+t("saved"));
    setTimeout(()=>{setSavedId(null);setForm(E);setShow(false);setEditId(null);},1600);
  };
  const del=id=>{setTrips(p=>p.filter(x=>x.id!==id));showToast("🗑 "+t("delete"));};
  const totalKm=trips.reduce((a,x)=>a+(+x.km||0),0);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        {[[trips.length,t("totalTrips"),"🚗","#0277BD","#E1F5FE"],[totalKm+"km",t("totalKm"),"📍","#00695C","#E0F2F1"]].map(([v,l,ic,col,bg])=>(
          <div key={l} style={{background:bg,borderRadius:16,padding:14}}><div style={{fontSize:22,marginBottom:4}}>{ic}</div><div style={{fontSize:20,fontWeight:800,color:col}}>{v}</div><div style={{fontSize:17,color:col,opacity:.8}}>{l}</div></div>
        ))}
      </div>
      <Btn onClick={()=>{setShow(!show);setEditId(null);setForm(E);}} col="#0277BD" full icon="🚗">{t("addTrip")}</Btn>
      {show&&(
        <Card style={{border:"2px solid #90CAF9",marginTop:14}}>
          <div style={{fontSize:17,fontWeight:700,color:"#0277BD",marginBottom:14}}>{editId?"✏️":""} {t("addTrip")}</div>
          <Field label={t("date")||"Date"} required><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label={t("from")+" *"}><input value={form.from} onChange={e=>setForm({...form,from:e.target.value})} placeholder="e.g. Shiralakoppa"/></Field>
            <Field label={t("to")+" *"}><input value={form.to} onChange={e=>setForm({...form,to:e.target.value})} placeholder="e.g. Mavinakoppa Farm"/></Field>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label={t("km")}><input type="number" value={form.km} onChange={e=>setForm({...form,km:e.target.value})} placeholder="0"/></Field>
            <Field label={t("fuelAmt")}><input type="number" value={form.fuelAmt} onChange={e=>setForm({...form,fuelAmt:e.target.value})} placeholder="0"/></Field>
          </div>
          <Field label={t("vehicle")}><select value={form.vehicle} onChange={e=>setForm({...form,vehicle:e.target.value})}>{VEHICLES.map(v=><option key={v}>{v}</option>)}</select></Field>
          <Field label={t("purpose")}><input value={form.purpose} onChange={e=>setForm({...form,purpose:e.target.value})} placeholder="ಕೆಲಸದ ಉದ್ದೇಶ"/></Field>
          <Field label={t("outcome")} mb={14}><input value={form.outcome} onChange={e=>setForm({...form,outcome:e.target.value})} placeholder="ಫಲಿತಾಂಶ"/></Field>
          <div style={{display:"flex",gap:10}}><Btn onClick={save} col="#0277BD" full>💾 {t("save")}</Btn><Btn onClick={()=>{setShow(false);setEditId(null);}} light col="#555" sm>{t("cancel")}</Btn></div>
        </Card>
      )}
      <div style={{marginTop:14}}>
        {trips.length===0&&<Empty icon="🚗" text={t("noActivity")}/>}
        {trips.map((tr,idx)=>{const isSaved=savedId===tr.id;return(
          <Card key={tr.id} style={{border:`1.5px solid ${isSaved?"#90CAF9":"transparent"}`,transition:"border .4s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{background:"#E1F5FE",borderRadius:10,padding:"5px 10px",fontSize:18,fontWeight:700,color:"#0277BD"}}>#{trips.length-idx}</div>
                <span style={{fontSize:18,color:"#888"}}>{fmt(tr.date)}</span>
              </div>
              {tr.km&&<span style={{background:"#E0F2F1",color:"#00695C",borderRadius:20,padding:"3px 10px",fontSize:17,fontWeight:600}}>{tr.km}km</span>}
            </div>
            <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>📍 {tr.from} → {tr.to}</div>
            <div style={{fontSize:18,color:"#555",marginBottom:3}}>🚗 {tr.vehicle}{tr.fuelAmt?" · ₹"+tr.fuelAmt:""}</div>
            {tr.purpose&&<div style={{fontSize:18,color:"#555"}}>📋 {tr.purpose}</div>}
            {tr.outcome&&<div style={{fontSize:18,color:"#2E7D32",fontWeight:600,marginTop:4}}>✅ {tr.outcome}</div>}
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={()=>{setForm({...tr});setEditId(tr.id);setShow(true);}} style={{flex:1,background:"#E1F5FE",border:"none",borderRadius:10,padding:9,fontSize:18,fontWeight:600,cursor:"pointer",color:"#0277BD"}}>✏️ {t("edit")}</button>
              <button onClick={()=>del(tr.id)} style={{flex:1,background:"#FFEBEE",border:"none",borderRadius:10,padding:9,fontSize:18,fontWeight:600,cursor:"pointer",color:"#C62828"}}>🗑 {t("delete")}</button>
            </div>
          </Card>
        );})}
      </div>
    </div>
  );
}

function LabourTab({farm,labour,setLabour,workers,setWorkers,showToast}){
  const{t}=useLang();
  const E={date:today(),workerName:"",workerId:"",days:"1",dailyRate:"",totalWages:"",taskDone:""};
  const[form,setForm]=useState(E);const[show,setShow]=useState(false);const[editId,setEditId]=useState(null);const[savedId,setSavedId]=useState(null);
  const[showWF,setShowWF]=useState(false);const[newW,setNewW]=useState({name:"",mobile:"",rate:""});

  const calcWages=()=>{const w=(+form.days||0)*(+form.dailyRate||0);setForm(p=>({...p,totalWages:w||""}));};
  const save=()=>{

  const totSal=payments.filter(p=>p.type==="salary").reduce((a,p)=>a+(+p.amount||0),0);

/* ── Report Page ────────────────────────────────── */
function ReportPage({farm,tasks,expenses,purchases,payments,income,labour,trips,docs,allTasks,user,onBack}){
  const{t}=useLang();
  const[df,setDf]=useState(new Date(Date.now()-30*864e5).toISOString().slice(0,10));
  const[dt,setDt]=useState(today());
  const fE=expenses.filter(e=>e.date>=df&&e.date<=dt);
  const fP=purchases.filter(p=>p.date>=df&&p.date<=dt);
  const fT=trips.filter(x=>x.date>=df&&x.date<=dt);
  const fL=labour.filter(x=>x.date>=df&&x.date<=dt);
  const fPay=payments.filter(x=>x.date>=df&&x.date<=dt);
  const gen=()=>{
    const doneSub=allTasks.reduce((a,tg)=>a+tg.sub.filter((_,i)=>(tasks[tg.id+"-"+i]?.status||"pending")==="taskDone").length,0);
    const totalSub=allTasks.reduce((a,tg)=>a+tg.sub.length,0);
    const tE=fE.reduce((a,e)=>a+(+e.amount||0),0);
    const tP=fP.reduce((a,p)=>a+(+p.amount||0),0);
    const tL=fL.reduce((a,l)=>a+(+l.totalWages||0),0);
    const fInc=(income||[]).filter(x=>x.date>=df&&x.date<=dt);
    const tInc=fInc.reduce((a,x)=>a+(+x.totalAmt||0),0);
    const tAdv=fPay.filter(p=>p.type==="advance").reduce((a,p)=>a+(+p.amount||0),0);
    const tCl=fPay.filter(p=>p.type==="claim").reduce((a,p)=>a+(+p.amount||0),0);
    const tSal=fPay.filter(p=>p.type==="salary").reduce((a,p)=>a+(+p.amount||0),0);
    const taskRows=allTasks.map(tg=>tg.sub.map((s,i)=>{const tk=tasks[tg.id+"-"+i]||{};const st=STATUS_CFG[tk.status||"pending"];return`<tr><td>${tg.id}</td><td>${tg.kn}</td><td>${s}</td><td style="color:${st.col};font-weight:700">${st.icon} ${tk.status||"pending"}</td><td>${tk.startDate||""}</td><td>${tk.doneDate||""}</td><td>${(tk.note||"").substring(0,50)}</td></tr>`;}).join("")).join("");

function ManagePage({user,onBack,showToast}){

    <div style={{minHeight:"100vh",background:"#F0F4F0"}}>
      <div style={{background:"#37474F",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,color:"#fff"}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",borderRadius:10,padding:"8px 14px",fontSize:18,cursor:"pointer"}}>‹ {t("back")}</button>
        <div style={{fontSize:17,fontWeight:700}}>{t("manageTitle")}</div>
      </div>
      <div style={{display:"flex",padding:"12px 16px 0",gap:8,overflowX:"auto"}}>
        {[[t("farmsTab"),"farms"],[t("usersTab"),"users"],[t("accessTab"),"access"]].map(([lb,id])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{background:tab===id?"#37474F":"#fff",color:tab===id?"#fff":"#555",
              border:`1.5px solid ${tab===id?"#37474F":"#ddd"}`,borderRadius:20,

function ManageFarms({showToast}){
  const{t}=useLang();
  const[farms,setFarms]=useState(null);const[editing,setEditing]=useState(null);
  useEffect(()=>{dbGet(gk("farms")).then(f=>setFarms(f||[]));});
  const del=async id=>{
    if(!window.confirm(t("delete")+"?"))return;
    const cur=await dbGet(gk("farms"))||[];const upd=cur.filter(f=>f.id!==id);
    await dbSet(gk("farms"),upd);setFarms(upd);showToast("🗑 "+t("delete"));
  };
  if(!farms)return<div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner/></div>;
  if(editing)return<FarmCreation editFarm={editing} onDone={async f=>{const cur=await dbGet(gk("farms"))||[];const upd=cur.map(x=>x.id===f.id?f:x);await dbSet(gk("farms"),upd);setEditing(null);showToast("✅ "+t("saved"));}} onBack={()=>setEditing(null)} showToast={showToast}/>;
  return(
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>{t("farmsTab")}</div>
      {farms.map(f=>(
        <Card key={f.id}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:48,height:48,background:f.col,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{f.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:15}}>{f.name}</div>
              <div style={{fontSize:17,color:"#888",marginTop:2}}>{f.type}{f.location?.village?" · "+f.location.village:""}</div>
              {f.land?.totalAcres&&<div style={{fontSize:17,color:"#555",marginTop:2}}>{f.land.totalAcres} acres · {f.land.purchasedAcres||"?"} purchased</div>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditing(f)} style={{background:"#E3F2FD",border:"none",borderRadius:10,padding:"8px 12px",fontSize:18,cursor:"pointer",color:"#1565C0"}}>✏️</button>
              <button onClick={()=>del(f.id)} style={{background:"#FFEBEE",border:"none",borderRadius:10,padding:"8px 12px",fontSize:18,cursor:"pointer",color:"#C62828"}}>🗑</button>
            </div>
          </div>
        </Card>
      ))}
    </div>
  );
}

function ManageUsers({showToast}){
  const{t}=useLang();
  const[users,setUsers]=useState(null);const[farms,setFarms]=useState([]);const[show,setShow]=useState(false);
  const E={id:"",firstName:"",lastName:"",mobile:"",role:"sup",pass:"",farms:[],active:true,lang:"kn"};
  const[form,setForm]=useState(E);const[editId,setEditId]=useState(null);const[saving,setSaving]=useState(false);
  useEffect(()=>{Promise.all([dbGet(gk("users")),dbGet(gk("farms"))]).then(([u,f])=>{setUsers(u||[]);setFarms(f||[]);});});
  const save=async()=>{
    if(!form.firstName.trim()||!form.id.trim()||!form.pass.trim()){showToast("Name, ID, Password "+t("required"),"warn");return;}
    setSaving(true);const cur=await dbGet(gk("users"))||[];let upd;
    if(editId){upd=cur.map(u=>u.id===editId?{...u,...form}:u);}
    else{if(cur.find(u=>u.id===form.id)){showToast("ID already exists","warn");setSaving(false);return;}upd=[...cur,{...form}];}
    await dbSet(gk("users"),upd);setUsers(upd);setShow(false);setEditId(null);setForm(E);setSaving(false);showToast("✅ "+t("saved"));
  };
  const toggleActive=async uid_=>{
    if(uid_==="owner")return;const cur=await dbGet(gk("users"))||[];const upd=cur.map(u=>u.id===uid_?{...u,active:!u.active}:u);await dbSet(gk("users"),upd);setUsers(upd);showToast("✅ Access updated");
  };
  const del=async uid_=>{
    if(uid_==="owner"||!window.confirm(t("delete")+"?"))return;
    const cur=await dbGet(gk("users"))||[];const upd=cur.filter(u=>u.id!==uid_);await dbSet(gk("users"),upd);setUsers(upd);showToast("🗑 "+t("delete"));
  };
  const tf=fid=>setForm(p=>({...p,farms:p.farms.includes(fid)?p.farms.filter(x=>x!==fid):[...p.farms,fid]}));
  if(!users)return<div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner/></div>;
  return(
    <div>
      <SHdr title={"👥 "+t("usersTab")} action={<Btn onClick={()=>{setShow(true);setEditId(null);setForm(E);}} sm col="#1565C0">{t("addUser")}</Btn>}/>
      {show&&(
        <Card style={{border:"2px solid #90CAF9",marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label={t("firstName")+" *"}><input value={form.firstName} onChange={e=>setForm({...form,firstName:e.target.value})} placeholder="ಮೊದಲ ಹೆಸರು"/></Field>
            <Field label={t("lastName")}><input value={form.lastName} onChange={e=>setForm({...form,lastName:e.target.value})} placeholder="ಕೊನೆಯ ಹೆಸರು"/></Field>
          </div>
          <Field label={t("mobile")}><input type="tel" value={form.mobile} onChange={e=>setForm({...form,mobile:e.target.value})} placeholder="9XXXXXXXXX"/></Field>
          <Field label={t("userIdLabel")+" *"}><input value={form.id} onChange={e=>setForm({...form,id:e.target.value.toLowerCase().replace(/\s/g,"")})} placeholder="sup2" disabled={!!editId} style={{opacity:editId?.6:1}}/></Field>
          <Field label={t("newPass")+" *"}><input value={form.pass} onChange={e=>setForm({...form,pass:e.target.value})} placeholder="Password"/></Field>
          <Field label={t("role")}><select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}><option value="sup">{t("supervisor")}</option><option value="owner">{t("owner")}</option></select></Field>
          {form.role==="sup"&&(
            <Field label={t("assignFarms")} mb={14}>
              {farms.map(f=>(
                <div key={f.id} onClick={()=>tf(f.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:form.farms.includes(f.id)?"#E8F5E9":"#f9f9f9",borderRadius:12,marginBottom:8,cursor:"pointer",border:`1.5px solid ${form.farms.includes(f.id)?"#A5D6A7":"#eee"}`}}>
                  <span style={{fontSize:20}}>{f.icon}</span><span style={{fontSize:18,fontWeight:600,flex:1}}>{f.name}</span>
                  <span style={{fontSize:18}}>{form.farms.includes(f.id)?"✅":"☐"}</span>
                </div>
              ))}
            </Field>
          )}
          <div style={{display:"flex",gap:10}}><Btn onClick={save} full disabled={saving}>{saving?t("saving"):"💾 "+t("save")}</Btn><Btn onClick={()=>{setShow(false);setEditId(null);}} light col="#555" sm>{t("cancel")}</Btn></div>
        </Card>
      )}
      {users.map(u=>(
        <Card key={u.id} style={{opacity:u.active===false?.6:1}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:46,height:46,borderRadius:"50%",background:u.role==="owner"?"#FFF9C4":"#E3F2FD",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{u.role==="owner"?"👑":"👷"}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:18,display:"flex",alignItems:"center",gap:6}}>
                {dispName(u)||u.id}
                <span style={{fontSize:17,background:u.active===false?"#FFEBEE":"#E8F5E9",color:u.active===false?"#C62828":"#2E7D32",borderRadius:8,padding:"2px 7px"}}>{u.active===false?t("revoked"):t("active")}</span>
              </div>
              <div style={{fontSize:17,color:"#888",marginTop:2}}>ID: {u.id} · {u.role==="owner"?t("owner"):t("supervisor")}{u.mobile?" · 📱"+u.mobile:""}</div>
              {u.role==="sup"&&<div style={{fontSize:17,color:"#555",marginTop:2}}>{t("assignFarms")}: {(u.farms||[]).length===0?"None":farms.filter(f=>(u.farms||[]).includes(f.id)).map(f=>f.name).join(", ")||"None"}</div>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <button onClick={()=>{setForm({id:u.id,firstName:u.firstName||"",lastName:u.lastName||"",mobile:u.mobile||"",role:u.role,pass:u.pass,farms:u.farms||[],active:u.active!==false,lang:u.lang||"kn"});setEditId(u.id);setShow(true);}} style={{background:"#E3F2FD",border:"none",borderRadius:10,padding:"7px 11px",fontSize:18,cursor:"pointer",color:"#1565C0"}}>✏️</button>
              {u.id!=="owner"&&<><button onClick={()=>toggleActive(u.id)} style={{background:u.active===false?"#E8F5E9":"#FFF3E0",border:"none",borderRadius:10,padding:"7px 11px",fontSize:18,cursor:"pointer",color:u.active===false?"#2E7D32":"#E65100"}}>{u.active===false?"✓":"🚫"}</button>
              <button onClick={()=>del(u.id)} style={{background:"#FFEBEE",border:"none",borderRadius:10,padding:"7px 11px",fontSize:18,cursor:"pointer",color:"#C62828"}}>🗑</button></>}
            </div>
          </div>
        </Card>
      ))}
    </div>
  );
}

function ManageAccess(){
  const{t}=useLang();
  const[users,setUsers]=useState(null);const[farms,setFarms]=useState([]);
  useEffect(()=>{Promise.all([dbGet(gk("users")),dbGet(gk("farms"))]).then(([u,f])=>{setUsers((u||[]).filter(x=>x.role==="sup"));setFarms(f||[]);});});
  if(!users)return<div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner/></div>;
  return(
    <div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:14}}>🔐 {t("accessTab")}</div>
      {users.length===0&&<Empty icon="👥" text={t("noActivity")}/>}
      {users.map(u=>(
        <Card key={u.id}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <span style={{fontSize:20}}>👷</span>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{dispName(u)||u.id}</div>
              <div style={{fontSize:17,color:"#888"}}>ID: {u.id}{u.mobile?" · 📱"+u.mobile:""} · {u.active===false?"🔴 "+t("revoked"):"🟢 "+t("active")}</div>
            </div>
          </div>
          {farms.map(f=>{const has=(u.farms||[]).includes(f.id);return(
            <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:has?"#E8F5E9":"#F5F5F5",borderRadius:10,marginBottom:6}}>
              <span style={{fontSize:18}}>{f.icon}</span>
              <span style={{fontSize:18,fontWeight:600,flex:1,color:has?"#2E7D32":"#aaa"}}>{f.name}</span>
              <span>{has?"✅":"—"}</span>
            </div>
          );})}
        </Card>
      ))}
    </div>
  );
}

/* ── Error Boundary ─────────────────────────────── */
class AppErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err)return(
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",
        alignItems:"center",justifyContent:"center",padding:24,background:"#F0F4F0",textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:16}}>⚠️</div>
        <div style={{fontSize:18,fontWeight:700,color:"#C62828",marginBottom:8}}>ದೋಷ ಸಂಭವಿಸಿದೆ</div>
        <div style={{fontSize:18,color:"#666",marginBottom:20}}>Something went wrong. Please go back and try again.</div>
        <div style={{background:"#FFEBEE",borderRadius:12,padding:"12px 16px",fontSize:17,color:"#C62828",marginBottom:20,maxWidth:340,wordBreak:"break-all",textAlign:"left"}}>
          {this.state.err?.message||"Unknown error"}
        </div>
        <button onClick={()=>window.location.reload()} style={{background:"#1B5E20",color:"#fff",border:"none",borderRadius:12,padding:"12px 24px",fontSize:18,fontWeight:700,cursor:"pointer"}}>
          🔄 Reload App
        </button>
      </div>
    );
    return this.props.children;
  }
}

/* ── FarmApp ─────────────────────────────────────── */
function FarmApp({user,setUser,farm,onSwitch,onLogout,showToast}){
  const{t}=useLang();
  const[page,setPage]=useState("home");
  const[overlay,setOverlay]=useState(null);
  const[showPin,setShowPin]=useState(false);
  const[pinTarget,setPinTarget]=useState(null);
  const requirePin=target=>{setPinTarget(target);setShowPin(true);};
  const onPinOk=()=>{setShowPin(false);setOverlay(pinTarget);setPinTarget(null);};
  const[tasks,setTasks]=useState({});
  const[customTasks,setCustomTasks]=useState([]);
  const[expenses,setExpenses]=useState([]);
  const[trips,setTrips]=useState([]);
  const[labour,setLabour]=useState([]);
  const[workers,setWorkers]=useState([]);
  const[purchases,setPurchases]=useState([]);
  const[docs,setDocs]=useState([]);
  const[payments,setPayments]=useState([]);
  const[income,setIncome]=useState([]);
  const[loaded,setLoaded]=useState(false);
  const[syncing,setSyncing]=useState(true);
  const[supervisors,setSupervisors]=useState([]);

  // Load farm data
  useEffect(()=>{
    setSyncing(true);
    Promise.all([
      dbGet(fk(farm.id,"tasks")),dbGet(fk(farm.id,"ctasks")),
      dbGet(fk(farm.id,"expenses")),dbGet(fk(farm.id,"trips")),
      dbGet(fk(farm.id,"labour")),dbGet(fk(farm.id,"workers")),
      dbGet(fk(farm.id,"purchases")),dbGet(fk(farm.id,"docs")),
      dbGet(fk(farm.id,"payments")),dbGet(fk(farm.id,"income")),dbGet(gk("users")),
    ]).then(([t,ct,e,tr,l,w,p,d,pay,inc,users])=>{
      if(t)setTasks(t);if(ct)setCustomTasks(ct);if(e)setExpenses(e);
      if(tr)setTrips(tr);if(l)setLabour(l);if(w)setWorkers(w);
      if(p)setPurchases(p);if(d)setDocs(d);if(pay)setPayments(pay);if(inc)setIncome(inc);
      const supList=(users||[]).filter(u=>u.role==="sup"&&((farm.supervisorIds||[]).includes(u.id)||(u.farms||[]).includes(farm.id)));
      setSupervisors(supList);
      // Seed default task groups on very first farm load
      // ct===null means never saved. ct===[] means user deleted all — respect that.
      // ct with T-style IDs means old data — keep it.
      const hasSeeded=ct!==null;
      if(!hasSeeded){
        const seeded=DEFAULT_TASK_GROUPS.map(tg=>({...tg,sub:[...tg.sub]}));
        setCustomTasks(seeded);
        dbSet(fk(farm.id,"ctasks"),seeded);
      }
      setLoaded(true);setSyncing(false);
    });
  },[farm.id]);

  // Auto-save to Supabase on change
  useEffect(()=>{if(loaded)dbSet(fk(farm.id,"tasks"),tasks);},[tasks,loaded]);
  useEffect(()=>{if(loaded)dbSet(fk(farm.id,"ctasks"),customTasks);},[customTasks,loaded]);
  useEffect(()=>{if(loaded)dbSet(fk(farm.id,"expenses"),expenses);},[expenses,loaded]);
  useEffect(()=>{if(loaded)dbSet(fk(farm.id,"trips"),trips);},[trips,loaded]);
  useEffect(()=>{if(loaded)dbSet(fk(farm.id,"labour"),labour);},[labour,loaded]);
  useEffect(()=>{if(loaded)dbSet(fk(farm.id,"workers"),workers);},[workers,loaded]);
  useEffect(()=>{if(loaded)dbSet(fk(farm.id,"purchases"),purchases);},[purchases,loaded]);
  useEffect(()=>{if(loaded)dbSet(fk(farm.id,"docs"),docs);},[docs,loaded]);
  useEffect(()=>{if(loaded)dbSet(fk(farm.id,"payments"),payments);},[payments,loaded]);
  useEffect(()=>{if(loaded)dbSet(fk(farm.id,"income"),income);},[income,loaded]);

  // Poll Supabase every 60s
  useEffect(()=>{
    const iv=setInterval(async()=>{
      setSyncing(true);
      const[t,ct,e,tr,l,w,p,d,pay,inc]=await Promise.all([
        sbGet(fk(farm.id,"tasks")),sbGet(fk(farm.id,"ctasks")),
        sbGet(fk(farm.id,"expenses")),sbGet(fk(farm.id,"trips")),
        sbGet(fk(farm.id,"labour")),sbGet(fk(farm.id,"workers")),
        sbGet(fk(farm.id,"purchases")),sbGet(fk(farm.id,"docs")),
        sbGet(fk(farm.id,"payments")),sbGet(fk(farm.id,"income")),
      ]);
      if(t)setTasks(t);if(ct)setCustomTasks(ct);if(e)setExpenses(e);
      if(tr)setTrips(tr);if(l)setLabour(l);if(w)setWorkers(w);
      if(p)setPurchases(p);if(d)setDocs(d);if(pay)setPayments(pay);if(inc)setIncome(inc);if(inc)setIncome(inc);
      setSyncing(false);
    },60000);
    return()=>clearInterval(iv);
  },[farm.id]);

  // allTasks = customTasks (defaults are seeded into customTasks on first farm load)
  const allTasks=customTasks.filter(g=>!g.id.endsWith("_ov"));
  const isOwner=user.role==="owner";

  // Overlays
  if(overlay==="profile")return(
    <ProfilePage user={user} onSave={u=>{setUser(u);setOverlay(null);}} onBack={()=>setOverlay(null)}/>
  );
  if(showPin)return(<><PinGate onVerified={onPinOk} onCancel={()=>{setShowPin(false);setPinTarget(null);}}/></>);
  if(overlay==="report")return(
    <ReportPage farm={farm} tasks={tasks} expenses={expenses} purchases={purchases} payments={payments} labour={labour} trips={trips} docs={docs} allTasks={allTasks} user={user} onBack={()=>setOverlay(null)}/>
  );
  if(overlay==="manage")return(
    <ManagePage user={user} onBack={()=>setOverlay(null)} showToast={showToast}/>
  );

  // Loading
  if(!loaded)return(
    <div style={{maxWidth:520,margin:"0 auto"}}>
      <Header user={user} farm={farm} onSwitch={onSwitch} onLogout={onLogout} onProfile={()=>setOverlay("profile")} syncing={true}/>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 20px",gap:16}}>
        <Spinner size={42}/><div style={{fontSize:18,color:"#666"}}>{t("loading")}</div>
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:520,margin:"0 auto",background:"#F0F4F0",minHeight:"100vh",paddingBottom:100}}>
      <Header user={user} farm={farm} onSwitch={onSwitch} onLogout={onLogout} onProfile={()=>setOverlay("profile")} syncing={syncing}/>

      {page==="home"&&(
        <Dashboard farm={farm} tasks={tasks} expenses={expenses} purchases={purchases} payments={payments} labour={labour} trips={trips} income={income} allTasks={allTasks} onNav={setPage}/>
      )}
      {page==="tasks"&&(
        <TasksPage farm={farm} tasks={tasks} setTasks={setTasks} customTasks={customTasks} setCustomTasks={setCustomTasks} user={user} showToast={showToast}/>
      )}
      {page==="daily"&&(
        <DailyPage farm={farm} trips={trips} setTrips={setTrips} labour={labour} setLabour={setLabour} workers={workers} setWorkers={setWorkers} showToast={showToast}/>
      )}
      {page==="finance"&&(
        <FinancePage farm={farm} expenses={expenses} setExpenses={setExpenses} purchases={purchases} setPurchases={setPurchases} payments={payments} setPayments={setPayments} income={income} setIncome={setIncome} trips={trips} supervisors={supervisors} user={user} showToast={showToast}/>
      )}
      {page==="more"&&(
        <MorePage farm={farm} docs={docs} setDocs={setDocs} user={user} onManage={isOwner?()=>requirePin("manage"):null} onProfile={()=>setOverlay("profile")} onReport={()=>requirePin("report")} showToast={showToast}/>
      )}

      <BottomNav page={page} setPage={setPage} isOwner={isOwner} onManageClick={()=>requirePin("manage")}/>
    </div>
  );
}

/* ── Root App ─────────────────────────────────────── */
function App(){
  const[user,setUser]=useState(null);
  const[farm,setFarm]=useState(null);
  const[view,setView]=useState("login"); // login|farms|farmapp|addFarm|profile|manage
  const[toast,setToast]=useState(null);
  const[initDone,setInitDone]=useState(false);
  const[lang,setLang_]=useState(()=>localStorage.getItem("nt:lang")||"kn");
  const toastRef=useRef(null);

  const showToast=useCallback((msg,type="success")=>{
    setToast({msg,type});clearTimeout(toastRef.current);
    toastRef.current=setTimeout(()=>setToast(null),2500);
  },[]);

  const setLang=l=>{setLang_(l);localStorage.setItem("nt:lang",l);};
  const t=useCallback(k=>TR[lang]?.[k]||TR.en?.[k]||k,[lang]);
  const langCtx=useMemo(()=>({lang,setLang,t}),[lang,t]);

  useEffect(()=>{initApp().then(()=>setInitDone(true));});

  const handleLogin=u=>{
    setUser(u);if(u.lang)setLang(u.lang);setView("farms");
  };
  const handleLogout=()=>{setUser(null);setFarm(null);setView("login");};
  const handleFarmSelect=f=>{setFarm(f);setView("farmapp");};

  if(!initDone)return(
    <LX.Provider value={langCtx}>
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#1B5E20,#2E7D32)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
        <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
          width:96,height:96,background:"rgba(255,255,255,.15)",
          borderRadius:30,border:"2px solid rgba(255,255,255,.3)",fontSize:52}}>🌾</div>
        <div style={{fontSize:40,fontWeight:900,color:"#fff",letterSpacing:"-0.03em",marginTop:4}}>ನಮ್ಮ ತೋಟ</div>
        <div style={{fontSize:18,color:"rgba(255,255,255,.6)",letterSpacing:"0.08em",textTransform:"uppercase"}}>NammaThota</div>
        <Spinner size={32} col="rgba(255,255,255,.7)"/>
        <div style={{position:"absolute",bottom:30,fontSize:17,color:"rgba(255,255,255,.35)",letterSpacing:"0.04em",textAlign:"center"}}>
          CodeTrail Technologies Private Limited
        </div>
      </div>
    </LX.Provider>
  );

  return(
    <LX.Provider value={langCtx}>
      <style>{`
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}} @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
        *{box-sizing:border-box;-webkit-tap-highlight-color:rgba(0,0,0,0)}
        input,select,textarea{outline:none}
        textarea{resize:none;line-height:1.5}
      `}</style>

      {view==="login"&&<Login onLogin={handleLogin}/>}

      {view==="addFarm"&&(
        <FarmCreation onDone={async f=>{
          const farms=await dbGet(gk("farms"))||[];
          await dbSet(gk("farms"),[...farms,f]);
          showToast("✅ Farm created!");setView("farms");
        }} onBack={()=>setView("farms")} showToast={showToast}/>
      )}

      {view==="farms"&&user&&(
        <FarmSelector
          user={user}
          onSelect={handleFarmSelect}
          onManage={()=>setView("manage")}
          onProfile={()=>setView("profile")}
          onAddFarm={()=>setView("addFarm")}
          showToast={showToast}
        />
      )}

      {view==="profile"&&user&&(
        <ProfilePage
          user={user}
          onSave={u=>{setUser(u);setView(farm?"farmapp":"farms");}}
          onBack={()=>setView(farm?"farmapp":"farms")}
        />
      )}

      {view==="manage"&&user&&(
        <ManagePage user={user} onBack={()=>setView("farms")} showToast={showToast}/>
      )}

      {view==="farmapp"&&user&&farm&&(
        <AppErrorBoundary>
          <FarmApp
            user={user}
            setUser={setUser}
            farm={farm}
            onSwitch={()=>{setFarm(null);setView("farms");}}
            onLogout={handleLogout}
            showToast={showToast}
          />
        </AppErrorBoundary>
      )}

      <Toast msg={toast?.msg} type={toast?.type}/>
    </LX.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
